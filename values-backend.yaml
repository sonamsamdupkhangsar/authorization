# Default values for mychart.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.


replicaCount: 1

image:
  repository: ghcr.io/sonamsamdupkhangsar/authorization
  tag: latest
  pullPolicy: Always

imagePullSecrets:
  - name: github-regcred
nameOverride: ""
fullnameOverride: "authorization-server"

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name:

rbac:
  create: true
  rules:
    - apiGroups:
        - ""
      resources:
        - services
        - endpoints
      verbs:
        - get
        - list
        - watch

podSecurityContext: {}
# fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
# runAsUser: 1000

service:
  type: ClusterIP
#  type: NodePort
  port: 80
  targetPort: 8080

istio:
  enabled: false

ingress:
  enabled: false
  ingressClass: nginx
  hosts:
    - host: authorization.sonam.cloud
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: sonam.cloud
      hosts:
        - "*.sonam.cloud"

httproute:
  gatewayName: "shared-tls-gateway"
  namespace: "main"
  exactPaths:
    - "/"
    - "/accounts/active"
    - "/accounts/lock"
    - "/accounts/lock/secret"
    - "/accounts/lock/email"
    - "/accounts/lock/email/secret"
  pathPrefixes:
    - "/css"
    - "/oauth2"
    - "/login"
    - "/logout"
    - "/signup"
    - "/password"
    - "/username"
    - "/loginHelp"
    - "/mfa"
    - "/userinfo"
    - "/.well-known"
    - "/issuer"
  hostRoutes:
    - name: platform
      hostname: "platform.openissuer.com"
      httpsListenerName: "https-platform"
      httpListenerName: "http-platform"
    - name: business1
      hostname: "business1.openissuer.com"
      httpsListenerName: "https-business1"
      httpListenerName: "http-business1"
    - name: business2
      hostname: "business2.openissuer.com"
      httpsListenerName: "https-business2"
      httpListenerName: "http-business2"
    - name: free
      hostname: "free.openissuer.com"
      httpsListenerName: "https-free"
      httpListenerName: "http-free"

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 1000m
    memory: 1536Mi

#nodeSelector:
#  node.kubernetes.io/instance-type: s-2vcpu-4gb

affinity: {}

postgres:
  port: "5432"
  service: authorization-db-rw
  secretfile: authorization-db-app
  dbname: authorization

envs:
  - name: JAVA_TOOL_OPTIONS
    value: "-XX:MaxRAMPercentage=70 -XX:InitialRAMPercentage=25"
  - name: SPRING_PROFILES_ACTIVE
    value: kubernetes,non-eureka
  - name: SPRING_CLOUD_KUBERNETES_DISCOVERY_NAMESPACES_0
    value: "{{ .Release.Namespace }}"
  - name: SPRING_AUTH_SERVER_PORT
    value: 8080
  - name: APPLICATION_REST_SERVICE
    value: "http://application-rest-service.{{ .Release.Namespace }}.svc.cluster.local"
  - name: AUTHENTICATION_REST_SERVICE
    value: "http://authentication-rest-service.{{ .Release.Namespace }}.svc.cluster.local"
  - name: ORGANIZATION_REST_SERVICE
    value: "http://organization-rest-service.{{ .Release.Namespace }}.svc.cluster.local"
  - name: USER_REST_SERVICE
    value: "http://user-rest-service.{{ .Release.Namespace }}.svc.cluster.local"
  - name: ACCOUNT_REST_SERVICE
    value: "http://account-rest-service.{{ .Release.Namespace }}.svc.cluster.local"
  - name: ATTEMPT_REST_SERVICE
    value: "http://attempt-rest-service.{{ .Release.Namespace }}.svc.cluster.local"
  - name: ROLE_REST_SERVICE
    value: "http://role-rest-service.{{ .Release.Namespace }}.svc.cluster.local"
  - name: SETTING_REST_SERVICE
    value: "http://setting-rest-service.{{ .Release.Namespace }}.svc.cluster.local"
  - name: private-client-url
    value: http://127.0.0.1:8090
  - name: AUTH_SERVER_PORT
    value: 8080
  - name: AUTH_SERVER_ROOT
    value: "http://authorization-server.{{ .Release.Namespace }}.svc.cluster.local"
  - name: TOKEN_MEDIATOR
    value: "http://oauth2-token-mediator.{{ .Release.Namespace }}.svc.cluster.local"
  - name: ISSUER_URI
    value: https://platform.openissuer.com
  - name: ISSUER_ADDRESS
    value: https://platform.openissuer.com
  - name: ALLOWED_ORIGINS
    value: https://platform.openissuer.com
  - name: AUTHORIZATION_SERVER_MULTITENANCY_DEFAULT_HOSTS_0
    value: localhost
  - name: AUTHORIZATION_SERVER_MULTITENANCY_DEFAULT_HOSTS_1
    value: 127.0.0.1
  - name: AUTHORIZATION_SERVER_MULTITENANCY_DEFAULT_HOSTS_2
    value: authorization-server
  - name: AUTHORIZATION_SERVER_MULTITENANCY_DEFAULT_HOSTS_3
    value: platform.openissuer.com
  - name: NEW_RELIC_ENABLED
    value: false
  - name: BUSINESS1_AUTH_DB_URL
    value: jdbc:postgresql://business1-auth-db-rw/business1auth
  - name: BUSINESS1_AUTH_DB_USERNAME
    value: business1auth
  - name: BUSINESS1_AUTH_DB_PASSWORD_SECRET_REF
    value: business1-db-password
  - name: BUSINESS2_AUTH_DB_URL
    value: jdbc:postgresql://business2-auth-db-rw/business2auth
  - name: BUSINESS2_AUTH_DB_USERNAME
    value: business2auth
  - name: BUSINESS2_AUTH_DB_PASSWORD_SECRET_REF
    value: business2-db-password
  - name: FREE_AUTH_DB_URL
    value: jdbc:postgresql://free-auth-db-rw/freeauth
  - name: FREE_AUTH_DB_USERNAME
    value: freeauth
  - name: FREE_AUTH_DB_PASSWORD_SECRET_REF
    value: free-db-password

health:
  startup:
    path: /api/health/liveness
    port: 8080
    initialDelaySeconds: 60
    periodSeconds: 10
    failureThreshold: 90
    timeoutSeconds: 5
  liveness:
    path: /api/health/liveness
    port: 8080
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 5
    timeoutSeconds: 5
  readiness:
    path: /api/health/readiness
    port: 8080
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 5
    timeoutSeconds: 5

secretFiles:
  - file: service-service-client-credential-flow-secret
    keys:
      - key: base64EncodedClientIdSecret
        name: BASE64_CLIENT_ID_SECRET
      - key: scopes
        name: REQUEST_SCOPES
      - key: authzmanagerInitialSecret
        name: AUTHZMANAGER_INITIAL_SECRET
  - file: business1-auth-db-app
    keys:
      - key: password
        name: TENANT_SECRET_BUSINESS1_DB_PASSWORD
  - file: business2-auth-db-app
    keys:
      - key: password
        name: TENANT_SECRET_BUSINESS2_DB_PASSWORD
  - file: free-auth-db-app
    keys:
      - key: password
        name: TENANT_SECRET_FREE_DB_PASSWORD
  - file: authorization-seed
    optional: true
    keys:
      - key: SPRING_APPLICATION_JSON
        name: SPRING_APPLICATION_JSON
