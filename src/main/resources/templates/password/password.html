<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OpenIssuer Account Help</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0-beta/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-/Y6pD6FV/Vv2HJnA6t+vslU6fwYXjCFtcEpHbNJ0lyAFsXTsjBbfaDjzALeQsN6M" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
    </head>
<body class="auth-page">
<div class="container">
    <form class="form-signin compact-form m-auto" method="post" th:action="@{/password}">
        <input type="hidden" name="returnTo" th:if="${returnTo}" th:value="${returnTo}">
        <h1 class="h3 mb-3 fw-normal">Reset your password</h1>
        <p>This will help you reset your password</p>
        <div th:if="${message}" class="alert alert-primary" role="alert">
            <span th:text="${message}"></span>
            <span>You can close this window.</span>
        </div>
        <div id="errorDiv" th:if="${error}" class="alert alert-danger" role="alert">
            <span id="errorSpan" th:text="${error}"></span>
        </div>
        <div th:if="${message == null} and ${accountSelfServiceDisabled != true}">
            <div class="form-floating">
                <input type="text" id="email" name="email" class="form-control" required autofocus>
                <label for="email">Email</label>
            </div>
            <button id="changePassword" class="btn-primary m-1 btn-lg" title="Change password" onclick="showLoading();">
                <span id="spinId" class="d-none" role="status" aria-hidden="true"></span>
                Forgot password
            </button>
        </div>
        <div class="mt-3">
            <div class="mt-2"><a th:if="${returnTo}" th:href="${returnTo}" style="color: dimgrey !important;">Go back to Sign-in page</a></div>
            <div class="mt-2"><a th:unless="${returnTo}" href="/" style="color: dimgrey !important;">Go back to Sign-in page</a></div>
        </div>
    </form>

</div>
</body>
</html>
