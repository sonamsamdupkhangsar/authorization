<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OpenIssuer Sign In</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0-beta/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-/Y6pD6FV/Vv2HJnA6t+vslU6fwYXjCFtcEpHbNJ0lyAFsXTsjBbfaDjzALeQsN6M" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <script th:inline="javascript">
    let usernameCheckRequestId = 0;

    window.addEventListener('load', function() {
      console.log("remove after loading body");
      const userIdCheckDivElement = document.getElementById('userIdCheckDiv');
      userIdCheckDivElement.style.display = "none";
    });

  function setSubmitDisabled(disabled) {
    document.getElementById("submit").disabled = disabled;
  }

  function checkUsername(url) {
    const requestId = ++usernameCheckRequestId;
    setSubmitDisabled(true);

    const usernameTextField = document.getElementById('username');
    if (usernameTextField.value.length <= 0) {
     // console.error('no username in text-field');
      setSubmitDisabled(false);
      return;
    }
    const usernameValue = usernameTextField.value;

    var xhr = new XMLHttpRequest();
    xhr.open("PUT", url, true);
    xhr.timeout = 10000;

    const userIdCheckDivElement = document.getElementById('userIdCheckDiv');
    userIdCheckDivElement.style.display = "none";

    const loginDiv = document.getElementById('loginDiv');
    if (loginDiv != null) {
        loginDiv.textContent = '';
        loginDiv.style.display = "none";
        console.log('clear loginDiv textContent');
    }

    xhr.onload = function () {
      if (xhr.status >= 200 && xhr.status < 300) {
          console.log('PUT request successful!');
          const spanElement = document.getElementById('userIdCheckSpan');
          if (xhr.responseText == 'authenticationId exists, is activated and a password is set') {
              spanElement.textContent = '';
              console.log('clear div');
          }
          else if (xhr.responseText.includes("Invalid username")) {
            //don't do anything
          }
          else if (xhr.responseText.includes("User needs to set their password.")) {
              userIdCheckDivElement.style.display = "block";
              spanElement.innerHTML = xhr.responseText + "(Use <strong>Forgot password?</strong> link to set password)";
          }
          else {
              userIdCheckDivElement.style.display = "block";
              spanElement.textContent = xhr.responseText;
          }
      }
      else {
          console.error('PUT request failed: ', xhr.status, xhr.responseText);
      }
      if (requestId === usernameCheckRequestId) {
        setSubmitDisabled(false);
      }
    };
    xhr.onerror = xhr.onabort = xhr.ontimeout = function () {
      console.error('PUT username check did not complete');
      if (requestId === usernameCheckRequestId) {
        setSubmitDisabled(false);
      }
    };
    xhr.send(usernameValue);
   }

    function showErrorDiv() {
        const loginDiv = document.getElementById('loginDiv');
        if (loginDiv == null) {
          console.log("loginDiv is null");
        }
        else {
            loginDiv.style.display = "block";
            console.log('show login div');
        }
    }
</script>
</head>
<body class="auth-page">
<div class="container">

    <form class="form-signin login-form m-auto" method="post" th:action="@{/}">
        <input type="hidden" name="client_id" th:if="${clientId}" th:value="${clientId}">
        <div id="userIdCheckDiv" class="alert alert-danger" role="alert">
            <span id="userIdCheckSpan"></span>
        </div>
        <div id="loginDiv" th:if="${param.error}" th:with="errorMsg=${session['SPRING_SECURITY_LAST_EXCEPTION'].message}" class="alert alert-danger" role="alert">
            Login failed. <span th:text="${errorMsg}"></span>.
        </div>
        <div th:if="${param.logout}" class="alert alert-success" role="alert">
            You have been logged out.
        </div>
        <h1 class="h3 mb-3 fw-normal">Sign in to OpenIssuer</h1>
        <div class="form-floating">
            <input type="text" id="username" name="username" autocomplete="username" class="form-control"
                   th:with="url = @{/users/username}"  th:onblur="checkUsername([[${url}]])" required autofocus>
            <label for="username">Username</label>
        </div>
        <div class="form-floating">
            <input type="password" id="password" name="password" autocomplete="current-password" class="form-control" required>
            <label for="password">Password</label>
        </div>
        <div>
            <button class="w-100 btn btn-lg btn-primary btn-block" type="submit" id="submit">Sign in</button>
        </div>
        <div class="mt-5" th:if="${accountSelfServiceAllowed}">
            <div class="mt-2"><a th:href="@{/password(returnTo=${returnTo})}" style="color: dimgrey !important;">Forgot password?</a></div>
            <div class="mt-2"><a th:href="@{/username(returnTo=${returnTo})}" style="color: dimgrey !important;">Forgot username?</a></div>
            <div class="mt-2"><a th:href="@{/accounts/active(returnTo=${returnTo})}" style="color: dimgrey !important;">Email activation link</a></div>
            <div class="mt-2"><a th:href="@{/accounts/lock(returnTo=${returnTo})}" style="color: dimgrey !important;">Unlock account</a></div>
        </div>
        <div class="row justify-content-around mt-3" th:if="${accountSelfServiceAllowed}">
            <div class="col"></div>
            <div class="col "><a th:href="@{/signup(returnTo=${returnTo})}">Signup here</a></div>
        </div>
    </form>


</div>
</body>
</html>
