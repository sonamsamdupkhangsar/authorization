<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Passkeys</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0-beta/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
</head>
<body>
<div class="container mt-5">
    <h1 class="h3 mb-4">Passkeys</h1>

    <div id="passkeySuccess" class="alert alert-success" role="alert" style="display:none">
        Passkey settings updated.
    </div>
    <div id="passkeyError" class="alert alert-danger" role="alert" style="display:none"></div>
    <div class="mb-3" th:if="${returnUrl != null}">
        <a class="btn btn-outline-secondary" th:href="${returnUrl}">Back to admin</a>
    </div>

    <div class="form-group">
        <label for="passkeyLabel">Passkey label</label>
        <input id="passkeyLabel" type="text" class="form-control" placeholder="MacBook, iPhone, security key">
    </div>
    <button id="registerPasskey" type="button" class="btn btn-primary">Add passkey</button>

    <hr class="my-4">

    <h2 class="h5">Registered passkeys</h2>
    <p th:if="${#lists.isEmpty(credentials)}" class="text-muted">No passkeys registered.</p>
    <div th:each="credential : ${credentials}" class="d-flex align-items-center justify-content-between border rounded p-3 mb-2">
        <div>
            <div th:text="${credential.label}">Passkey</div>
            <small class="text-muted">
                Created
                <span th:text="${credential.created}">created</span>
                <span th:if="${credential.lastUsed != null}">
                    , last used <span th:text="${credential.lastUsed}">last used</span>
                </span>
            </small>
        </div>
        <form th:action="@{/webauthn/register/{id}(id=${credential.credentialId.toBase64UrlString()})}" method="post">
            <button type="submit" class="btn btn-outline-danger btn-sm">Remove</button>
        </form>
    </div>
</div>

    <script th:inline="javascript">
    const contextPath = /*[[@{/}]]*/ '/';
    const basePath = contextPath.endsWith('/') ? contextPath.substring(0, contextPath.length - 1) : contextPath;
    const returnUrl = /*[[${returnUrl}]]*/ null;

    function show(element) {
        if (element) {
            element.style.display = 'block';
        }
    }

    function hide(element) {
        if (element) {
            element.style.display = 'none';
        }
    }

    function resetMessages() {
        hide(document.getElementById('passkeySuccess'));
        hide(document.getElementById('passkeyError'));
    }

    function showError(message) {
        resetMessages();
        const error = document.getElementById('passkeyError');
        error.textContent = message;
        show(error);
    }

    function base64UrlEncode(buffer) {
        const base64 = window.btoa(String.fromCharCode(...new Uint8Array(buffer)));
        return base64.replace(/=/g, '').replace(/\+/g, '-').replace(/\//g, '_');
    }

    function base64UrlDecode(value) {
        const base64 = value.replace(/-/g, '+').replace(/_/g, '/');
        const binary = window.atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) {
            bytes[i] = binary.charCodeAt(i);
        }
        return bytes.buffer;
    }

    async function postJson(url, body) {
        const options = {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
        };
        if (body) {
            options.body = JSON.stringify(body);
        }
        const response = await fetch(url, options);
        if (!response.ok) {
            throw new Error(`Server responded with HTTP ${response.status}`);
        }
        return response.json();
    }

    async function registerPasskey() {
        resetMessages();
        if (!window.PublicKeyCredential) {
            throw new Error('Passkeys require a browser secure context. Use HTTPS, or use localhost for local testing.');
        }

        const label = document.getElementById('passkeyLabel').value.trim();
        if (!label) {
            throw new Error('Passkey label is required.');
        }

        const options = await postJson(`${basePath}/webauthn/register/options`);
        const publicKey = {
            ...options,
            user: {
                ...options.user,
                id: base64UrlDecode(options.user.id)
            },
            challenge: base64UrlDecode(options.challenge),
            excludeCredentials: (options.excludeCredentials || []).map((credential) => ({
                ...credential,
                id: base64UrlDecode(credential.id)
            }))
        };

        const credentialsContainer = await navigator.credentials.create({ publicKey });
        const response = credentialsContainer.response;
        const credential = {
            id: credentialsContainer.id,
            rawId: base64UrlEncode(credentialsContainer.rawId),
            response: {
                attestationObject: base64UrlEncode(response.attestationObject),
                clientDataJSON: base64UrlEncode(response.clientDataJSON),
                transports: response.getTransports ? response.getTransports() : []
            },
            type: credentialsContainer.type,
            clientExtensionResults: credentialsContainer.getClientExtensionResults(),
            authenticatorAttachment: credentialsContainer.authenticatorAttachment
        };

        const result = await postJson(`${basePath}/webauthn/register`, {
            publicKey: {
                credential,
                label
            }
        });
        if (!result || !result.success) {
            throw new Error(`Registration failed. Server responded with: ${JSON.stringify(result)}`);
        }
        window.location.href = passkeysUrlWithSuccess();
    }

    async function deletePasskey(form) {
        resetMessages();
        const response = await fetch(form.action, {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' }
        });
        if (!response.ok) {
            throw new Error(`Server responded with HTTP ${response.status}`);
        }
        window.location.href = passkeysUrlWithSuccess();
    }

    function passkeysUrlWithSuccess() {
        const url = new URL(`${basePath}/mfa/passkeys`, window.location.origin);
        url.searchParams.set('success', '');
        if (returnUrl) {
            url.searchParams.set('return_url', returnUrl);
        }
        return url.toString();
    }

    window.addEventListener('load', function () {
        const queryString = new URLSearchParams(window.location.search);
        if (queryString.has('success')) {
            show(document.getElementById('passkeySuccess'));
        }
        if (!window.PublicKeyCredential) {
            showError('Passkeys require a browser secure context. Use HTTPS, or use localhost for local testing.');
        }

        document.getElementById('registerPasskey').addEventListener('click', async function () {
            try {
                await registerPasskey();
            } catch (error) {
                showError(error.message);
                console.error(error);
            }
        });

        Array.from(document.querySelectorAll('form[action*="/webauthn/register/"]')).forEach((form) => {
            form.addEventListener('submit', async function (event) {
                event.preventDefault();
                try {
                    await deletePasskey(form);
                } catch (error) {
                    showError(error.message);
                    console.error(error);
                }
            });
        });
    });
</script>
</body>
</html>
