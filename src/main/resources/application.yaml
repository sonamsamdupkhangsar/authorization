server:
  port: ${AUTH_SERVER_PORT}

logging:
  level:
    root: info
    me.sonam: info
    #com.netflix: off
    #me.sonam.auth.config: info
    #me.sonam.auth.util.TokenFilter: info

#    org.springframework.web: info
#    org.springframework.security: info
#    org.springframework.security.oauth2: info
#    org.springframework.boot.autoconfigure: warn

spring:
  application:
    name: authorization-server
  datasource:
    url: jdbc:postgresql://${POSTGRES_SERVICE}/${POSTGRES_DBNAME}
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    generate-ddl: true
  thymeleaf: # to enable hot reload of Thymeleaf templates
    cache: false
    mode: HTML
    encoding: UTF-8
    #prefix: file:src/main/resources/templates/
    classpath: /templates/
    suffix: .html
  resources: # Static resources
    static-locations: file:src/main/resources/static/
    cache:
      period: 0
  authorization-server:
    forward-cookies: false

authorization-server:
  multitenancy:
    default-hosts:
      - localhost
      - 127.0.0.1
      - authorization-server
    tenants:
      free:
        hosts:
          - free.openissuer.com
        url: ${FREE_AUTH_DB_URL}
        username: ${FREE_AUTH_DB_USERNAME}
        password-secret-ref: ${FREE_AUTH_DB_PASSWORD_SECRET_REF}
        driver-class-name: ${FREE_AUTH_DB_DRIVER:org.postgresql.Driver}
      business1:
        hosts:
          - business1.openissuer.com
        url: ${BUSINESS1_AUTH_DB_URL}
        username: ${BUSINESS1_AUTH_DB_USERNAME}
        password-secret-ref: ${BUSINESS1_AUTH_DB_PASSWORD_SECRET_REF}
        driver-class-name: ${BUSINESS1_AUTH_DB_DRIVER:org.postgresql.Driver}
      business2:
        hosts:
          - business2.openissuer.com
        url: ${BUSINESS2_AUTH_DB_URL}
        username: ${BUSINESS2_AUTH_DB_USERNAME}
        password-secret-ref: ${BUSINESS2_AUTH_DB_PASSWORD_SECRET_REF}
        driver-class-name: ${BUSINESS2_AUTH_DB_DRIVER:org.postgresql.Driver}
      demo:
        hosts:
          - demo.openissuer.com
        url: ${DEMO_AUTH_DB_URL}
        username: ${DEMO_AUTH_DB_USERNAME}
        password-secret-ref: ${DEMO_AUTH_DB_PASSWORD_SECRET_REF}
        driver-class-name: ${DEMO_AUTH_DB_DRIVER:org.postgresql.Driver}
  signup-policy:
    hosts:
      free.openissuer.com:
        allow-signup: true
        create-organization-on-signup: true
        allowed-email-domains:
          - "*"
      business1.openissuer.com:
        allow-signup: true
        create-organization-on-signup: false
        allowed-email-domains:
          - business1.com
      business2.openissuer.com:
        allow-signup: true
        create-organization-on-signup: false
        allowed-email-domains:
          - business2.com
      demo.openissuer.com:
        allow-account-self-service: false
        allow-signup: false
        create-organization-on-signup: false
        allowed-email-domains: []

demo-cleanup:
  enabled: ${DEMO_CLEANUP_ENABLED:false}
  tenant-host: ${DEMO_CLEANUP_TENANT_HOST:demo.openissuer.com}
  preserved-client-ids: ${DEMO_CLEANUP_PRESERVED_CLIENT_IDS:nextauth-demo}
  initial-delay-seconds: ${DEMO_CLEANUP_INITIAL_DELAY_SECONDS:300}
  fixed-delay-seconds: ${DEMO_CLEANUP_FIXED_DELAY_SECONDS:21600}
application-rest-service:
  root: ${APPLICATION_REST_SERVICE}
  client-role: /applications/clients/{clientId}/users/{authenticationId}

authentication-rest-service:
  root: ${AUTHENTICATION_REST_SERVICE}
  context: ${authentication-rest-service.root}/authentications
  authenticate: ${authentication-rest-service.context}/authenticate
  authenticationId: ${authentication-rest-service.context}/authenticationId


user-rest-service:
  root: ${USER_REST_SERVICE}
  context: ${user-rest-service.root}/users
  userId: ${user-rest-service.context}/{id}
  userByAuthId: ${user-rest-service.context}/authentication-id/{authenticationId}

organization-rest-service:
  root: ${ORGANIZATION_REST_SERVICE}
  context: ${organization-rest-service.root}/organizations
  userExistsInOrganization: /organizations/{organizationId}/users/{userId}
  organizationBySubdomain: /organizations/subdomain/{subdomain}

account-rest-service:
  root: ${ACCOUNT_REST_SERVICE}
  context: ${account-rest-service.root}/accounts
  emailUsername: ${account-rest-service.context}/email/authentication-id
  emailMySecret: ${account-rest-service.context}/email/password-secret
  emailActivateLink: ${account-rest-service.context}/active/email/password-secret
  validateEmailLoginSecret: ${account-rest-service.context}/{email}/password-secret/{secret}
  updatePassword: ${account-rest-service.context}/password-secret
  emailSecretUnlockAccount: ${account-rest-service.context}/lock/email/password-secret
  lockAccount: ${account-rest-service.context}/lock/true
  unLockAccount: ${account-rest-service.context}/lock/false
  unLockAccountTimeExpire: ${account-rest-service.context}/lock/false/expire
  isAccountLocked: ${account-rest-service.context}/lock

# this is used for getting accesstoken by header filter
auth-server:
  root: http://authorization-server
  context-path:
  oauth2token:
    path: /oauth2/token
    grantType: client_credentials
    issuerTokenPath: /oauth2/token

attempt-rest-service:
  root: ${ATTEMPT_REST_SERVICE}
  context: ${attempt-rest-service.root}/attempts
  failed: ${attempt-rest-service.context}/login/failed
  success: ${attempt-rest-service.context}/login/success
  delete: ${attempt-rest-service.context}/{username}
  check: ${attempt-rest-service.context}/login

role-rest-service:
  root: ${ROLE_REST_SERVICE}
  context: ${role-rest-service.root}/roles

setting-rest-service:
  root: ${SETTING_REST_SERVICE}
  context: ${setting-rest-service.root}/settings
  users: ${setting-rest-service.context}/users
  defaultOrganization: ${setting-rest-service.users}/{userId}

client:
  url: ${client-app}
  forgot-username-password: /forgot

requestFilters:
  - out:
    outHttpMethods:
    accessToken:
      option: forward
      scopes:
      base64EncodedClientIdSecret: ${BASE64_CLIENT_ID_SECRET}


# this is for create authzmanager client if it is not present
authzmanager-id: b4dfe3fb-1692-44b8-92ab-366ccc84b539
authzmanager-client: b4dfe3fb-1692-44b8-92ab-366ccc84b539-authzmanager
authzmanager-admin-label: admin
tokenExpireSeconds: 180

authIdNotExist: authentication does not exist with authId
authNotActive: Authentication not active, activate your account first
authPasswordNotSet: User needs to set their password.

maxClients: 5
maxOrganizations: 1
maxUserPerOrganization: 5
maxRoles: 5

client-limits:
  default-max-clients: ${MAX_CLIENTS:5}
  hosts:
    free.openissuer.com: ${FREE_MAX_CLIENTS:2}
    demo.openissuer.com: ${DEMO_MAX_CLIENTS:2}

organization-seed:
  delay-seconds: 120
  organizations: []
