#server:
#  port: 9000
AUTH_SERVER_PORT: 9000


logging:
  level:
    root: info
    #org.springframework.web: INFO
    #org.springframework.security: info
    #org.springframework.security.oauth2: info
    me.sonam.auth: debug
#    org.springframework.boot.autoconfigure: DEBUG

eureka:
  client:
    enabled: false

spring:
  profiles:
    active: localDevTest
  application:
    name: authorization-service
  datasource:
    url: jdbc:hsqldb:mem:testdb
    username: sa
    password:
    driver-class-name: org.hsqldb.jdbc.JDBCDriver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.HSQLDialect
    generate-ddl: true

application-rest-service:
  root: http://localhost:8080
  client-role: /applications/clients/{clientId}/users/{authenticationId}

authentication-rest-service:
  root: http://localhost:8080
  context: ${authentication-rest-service.root}/authentications
  authenticate: ${authentication-rest-service.context}/authenticate
  authenticationId: ${authentication-rest-service.context}/authenticationId

user-rest-service:
  root: http://localhost:8080
  context: ${user-rest-service.root}/users
  userByAuthId: ${user-rest-service.context}/authentication-id/{authenticationId}

organization-rest-service:
  root: http://localhost:8080
  context: ${organization-rest-service.root}/organizations
  userExistsInOrganization: /organizations/{organizationId}/users/{userId}

account-rest-service:
  root:  http://localhost:8080
  context: ${account-rest-service.root}/accounts
  emailUsername: ${account-rest-service.context}/email/authentication-id
  emailMySecret: ${account-rest-service.context}/email/password-secret
  emailActivateLink: ${account-rest-service.context}/active/email/password-secret
  validateEmailLoginSecret: ${account-rest-service.context}/{email}/password-secret/{secret}
  updatePassword: ${account-rest-service.context}/password-secret
  emailSecretUnlockAccount: ${account-rest-service.context}/lock/email/password-secret
  lockAccount: ${account-rest-service.context}/lock/true
  unLockAccount: ${account-rest-service.context}/lock/false
  unLockAccountTimeExpire: ${account-rest-service.context}/lock/false/expire
  isAccountLocked: ${account-rest-service.context}/lock

attempt-rest-service:
  root: http://localhost:8080
  context: ${attempt-rest-service.root}/attempts
  failed: ${attempt-rest-service.context}/login/failed
  success: ${attempt-rest-service.context}/login/success
  delete: ${attempt-rest-service.context}/{username}
  check: ${attempt-rest-service.context}/login

setting-rest-service:
  root: http://localhost:{port}
  context: ${setting-rest-service.root}/settings
  users: ${setting-rest-service.context}/users
  defaultOrganization: ${setting-rest-service.context}/users

role-rest-service:
  root: http://localhost:{port}
  context: ${role-rest-service.root}/roles

ISSUER_URI: http://my-server:9001
private-client-url: http://127.0.0.1:8090


requestFilters:
  - out:
    outHttpMethods:
    accessToken:
      option: forward
      scopes: ${REQUEST_SCOPES}
      base64EncodedClientIdSecret: ${BASE64_CLIENT_ID_SECRET}



# this is used for getting accesstoken by header filter
auth-server:
  root: http://localhost:{port}
  context-path:
  oauth2token:
    path: /oauth2/token
    grantType: client_credentials


BASE64_CLIENT_ID_SECRET: dXNlcjpzZWNyZXQ=
REQUEST_SCOPES: cmVhZCB3cml0ZQ==

allowedOrigins: 10.0.0.28, localhost, 127.0.0.1

authorization-server:
  multitenancy:
    default-hosts:
      - localhost
      - 127.0.0.1
    tenants:
      business1:
        hosts:
          - business1.openissuer.test
        url: jdbc:hsqldb:mem:business1db
        username: sa
        password-secret-ref: business1-db-password
        driver-class-name: org.hsqldb.jdbc.JDBCDriver
      business2:
        hosts:
          - business2.openissuer.test
        url: jdbc:hsqldb:mem:business2db
        username: sa
        password-secret-ref: business2-db-password
        driver-class-name: org.hsqldb.jdbc.JDBCDriver

tenant-secrets:
  business1-db-password: ""
  business2-db-password: ""
  dynamic-tenant-db-password: ""

authzmanager: http://localhost:9093

# this is for create authzmanager client if it is not present
authzmanager-id: b4dfe3fb-1692-44b8-92ab-366ccc84b539
authzmanager-client: b4dfe3fb-1692-44b8-92ab-366ccc84b539-authzmanager
AUTHZMANAGER_INITIAL_SECRET: hello
  
tokenExpireSeconds: 3

authIdNotExist: authentication does not exist with authId
authNotActive: Authentication not active, activate your account first
authPasswordNotSet: User needs to set their password.

maxClients: 5
maxOrganizations: 1
maxUserPerOrganization: 5
maxRoles: 5
