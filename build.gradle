/*
 * This file was generated by the Gradle 'init' task.
 */

plugins {
    id "org.springframework.boot" version "4.0.0"
    //id "org.springframework.boot" version "3.4.1"
    id "io.spring.dependency-management" version "1.1.7"
    id "java"
    id "maven-publish"
    id "de.undercouch.download" version "5.3.0"
}

group = 'me.sonam'
version = '1.0'
description = 'authorization'
java.sourceCompatibility = JavaVersion.VERSION_21

repositories {
    mavenCentral()
    maven { url 'https://repo.spring.io/milestone' }
    mavenLocal()
    maven {
        url = uri("https://maven.pkg.github.com/sonamsamdupkhangsar/token-filter")
        credentials {
            username = System.getenv("USERNAME")
            password = System.getenv("PERSONAL_ACCESS_TOKEN")
        }
    }
}

ext {
    set('springCloudVersion', "2025.1.0")
}

dependencies {

    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-webflux'
    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'org.springframework.boot:spring-boot-starter-jdbc'
    implementation 'org.springframework.security:spring-security-oauth2-authorization-server:7.0.0'//1.5.5'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'jakarta.ws.rs:jakarta.ws.rs-api:3.1.0'
   // implementation 'org.springframework.cloud:spring-cloud-starter-netflix-eureka-client'
    implementation 'org.springframework.cloud:spring-cloud-starter-kubernetes-client-all'//:5.0.0'
    implementation("org.springframework.boot:spring-boot-starter-validation")
    implementation 'org.postgresql:postgresql:42.6.0'
   // implementation("com.google.code.gson:gson:2.11.0")
    implementation 'org.springframework.boot:spring-boot-starter-thymeleaf'

    testImplementation 'com.h2database:h2:2.2.220'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.security:spring-security-test'
    testImplementation 'org.springframework.boot:spring-boot-starter-webmvc-test'
    testImplementation("org.springframework.boot:spring-boot-starter-webflux-test")
    testImplementation 'org.springframework.boot:spring-boot-webtestclient'
    testImplementation 'io.projectreactor:reactor-test:3.8.1'
 //   testImplementation 'org.junit.jupiter:junit-jupiter'
    testImplementation 'org.htmlunit:htmlunit:4.7.0'
    testImplementation 'com.squareup.okhttp3:mockwebserver:4.0.1'
    testImplementation group: 'org.hsqldb', name: 'hsqldb', version: '2.0.0'
    //testImplementation 'org.junit.jupiter:junit-jupiter-api:5.10.1' // Use the latest version
    //testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.10.1' // Use the latest version
    //testRuntimeOnly 'org.junit.platform:junit-platform-launcher:1.10.1' // Use the latest version

    testImplementation platform('org.junit:junit-bom:5.11.0') // Use the latest stable version
    testImplementation 'org.junit.jupiter:junit-jupiter-api'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine'
    testRuntimeOnly("org.junit.platform:junit-platform-launcher")
    //implementation("tools.jackson.core:jackson-databind:3.0.3")
    //implementation("tools.jackson.core:jackson-core:3.0.0")
}
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}
tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

tasks.withType(Javadoc) {
    options.encoding = 'UTF-8'
}
tasks.named('test', Test) {
    useJUnitPlatform()

    maxHeapSize = '1G'

    testLogging {
        events "passed"
    }
}

test {
    filter {
        //include all tests from package
        includeTestsMatching "me.sonam.auth"

        //include all integration tests
        includeTestsMatching "*Test*"
    }
}

dependencyManagement {
    imports {
        mavenBom "org.springframework.cloud:spring-cloud-dependencies:${springCloudVersion}"
     //   mavenBom 'org.springframework.security:spring-security-bom:7.0.2' // Specify the desired Spring Security version
    }
}

publishing {
    repositories {
        maven {
            name = "GitHubPackages"
            url = "https://maven.pkg.github.com/sonamsamdupkhangsar/authorization"
            credentials {
                username = System.getenv("USERNAME")
                password = System.getenv("PERSONAL_ACCESS_TOKEN")
            }
        }
    }
    publications {
        maven(MavenPublication) {
            from components.java
        }
    }
}

task downloadNewrelic(type: Download) {
    mkdir 'newrelic'
    src 'https://download.newrelic.com/newrelic/java-agent/newrelic-agent/current/newrelic-java.zip'
    dest file('newrelic')
}

task unzipNewrelic(type: Copy) {
    from zipTree(file('newrelic/newrelic-java.zip'))
    into rootDir
}

task reload(type: Copy) {
    from 'src/main/resources'
    into 'build/resources/main'
    include 'static/**'
    include 'templates/**'
    include 'custom/**'
}